name: 'upload-gh-release-assets'
description: 'Upload release assets to GitHub Releases with overwrite support'
author: 'zhiqiang <zhiqiang2033@gmail.com>'
inputs:
  token:
    description: 'GitHub Token with `repo` scope'
    required: false
    default: ${{ github.token }}
  files:
    description: 'List of files to upload, separated by space'
    required: true
  tag:
    description: 'Git tag name to upload assets to (defaults to latest release)'
    required: false
  repo:
    description: 'Repository in format "owner/repo" (defaults to current repo)'
    required: false
  release_body:
    description: 'Release description body (optional)'
    required: false
    
env:
  GITHUB_TOKEN: "As provided by Github Actions"

outputs:
  id:
    description: "Release ID"
  files:
    description: "Uploaded file names, one per line"
  download_urls:
    description: "Download URLs of uploaded assets, one per line"
runs:

  using: 'node20'
  main: 'dist/index.js'
branding:
  icon: 'airplay'
  color: 'red'
